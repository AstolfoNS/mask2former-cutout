# Global Hydra config — aggregates data, model, and train configs

defaults:
  - data: coco
  - model: mask2former_swin_small
  - train: default
  - _self_

# Project metadata
project: "mask2former-cutout"
experiment_name: "mask2former-swin-small-cutout-v1"

# Wandb logging
wandb:
  enabled: true
  project: ${..project}
  name: ${..experiment_name}
  tags: ["mask2former", "cutout", "person", "car"]

# Output directory (checkpoints & logs)
output_dir: ${hydra:runtime.cwd}/weights

# Hydra run output
hydra:
  run:
    dir: ${hydra:runtime.cwd}/outputs/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false
