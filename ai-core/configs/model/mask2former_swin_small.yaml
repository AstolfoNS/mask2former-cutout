# @package _group_
# Model configuration — Mask2Former with Swin-Small backbone

model_name: "mask2former-swin-small"

# Hugging Face model identifier
hf_model_id: "facebook/mask2former-swin-small-coco-instance"

# Backbone
backbone:
  type: "swin_small"
  pretrained: true

# Decoder
decoder:
  type: "mask2former"
  hidden_dim: 256

# Binary segmentation head for person & car (2 categories)
num_labels: 2
label_names: ["person", "car"]

# Whether to ignore the original classification head and replace
ignore_mismatched_sizes: true

# Loss weights
loss:
  mask_loss:
    type: "binary_cross_entropy"
    weight: 1.0
  dice_loss:
    type: "dice"
    weight: 1.0
