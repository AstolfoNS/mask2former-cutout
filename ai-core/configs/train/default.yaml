# @package _group_
# Training configuration — optimized for RTX 4090 24GB VRAM

# Hardware
device: "cuda"
num_workers: 8
pin_memory: true
persistent_workers: true

# Precision & performance
use_bf16: true          # BF16: no gradient overflow, no dynamic scaling needed
use_tf32: true          # TF32: full-speed matmul on Ampere (RTX 4090)
gradient_checkpointing: false  # Disabled to maximize throughput on 24GB

# Batch & gradient accumulation
batch_size: 4           # Start safe; can push to 6–8 after smoke test
gradient_accumulation_steps: 2  # Effective batch = 4 * 2 = 8

# Optimizer
optimizer:
  type: "adamw"
  learning_rate: 5.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.999]

# Scheduler
scheduler:
  type: "cosine_with_warmup"
  warmup_steps: 500
  total_steps: 10000

# Training loop
max_steps: 10000
eval_every: 500
save_every: 1000
log_every: 50

# Validation
val:
  batch_size: 2
  subset_size: 200  # Number of val images to evaluate

# Seed
seed: 42
